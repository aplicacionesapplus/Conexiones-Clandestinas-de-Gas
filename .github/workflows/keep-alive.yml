name: Supabase Keep-Alive

on:
  schedule:
    # Se ejecuta todos los lunes y jueves a las 08:00 UTC (03:00 hora Perú)
    - cron: '0 8 * * 1,4'
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase table
        run: |
          curl -s -X GET \
            "${{ secrets.SUPABASE_URL }}/rest/v1/registros_clandestinos?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
